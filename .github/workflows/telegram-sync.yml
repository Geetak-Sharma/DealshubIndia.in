name: Telegram Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {} # Force "Run workflow" button to appear

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main # Target SPECIFIC branch
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Auto-Loot Force-Sync
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: "Geetak-Sharma/DealshubIndia.in"
        run: node scripts/telegram-sync.js

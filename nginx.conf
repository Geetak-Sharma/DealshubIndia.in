server {
    listen 80;
    listen [::]:80;
    server_name dealshubindia.in www.dealshubindia.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dealshubindia.in www.dealshubindia.in;

    root /var/www/dealshubindia.in/htdocs;
    index index.html;

    # Paths updated to match your actual files
    ssl_certificate /etc/letsencrypt/live/dealshubindia.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dealshubindia.in/key.pem;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/dealshubindia.in.access.log;
    error_log /var/log/nginx/dealshubindia.in.error.log;
}
